<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>ClimaX VPTI 야외 검증</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --border: #475569;
    --accent: #38bdf8;
    --safe:    #16a34a;
    --caution: #eab308;
    --warning: #f97316;
    --danger:  #dc2626;
    --severe:  #7c2d12;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
                 "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    font-size: 16px;            /* iOS 자동 줌 방지 */
    line-height: 1.5;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  main { max-width: 480px; margin: 0 auto; padding: 16px; }
  h1 {
    font-size: 1.25rem; margin: 8px 0 16px;
    display: flex; align-items: center; gap: 8px;
  }
  h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  button {
    font: inherit;
    border: none;
    border-radius: 12px;
    padding: 16px;
    width: 100%;
    cursor: pointer;
    touch-action: manipulation;
  }
  button.primary {
    background: var(--accent); color: #0f172a;
    font-weight: 700; font-size: 1.125rem;
    min-height: 64px;
  }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: var(--surface-2); color: var(--text);
    font-size: 0.95rem; padding: 12px;
  }
  button.danger-btn { background: #7f1d1d; color: var(--text); }

  .status { font-size: 0.9rem; color: var(--text-dim); min-height: 1.5em; }
  .status.error { color: #fca5a5; }

  .vpti-display {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 0;
  }
  .vpti-number {
    font-size: 4.5rem; font-weight: 800; line-height: 1; letter-spacing: -0.04em;
  }
  .vpti-unit { font-size: 1.5rem; color: var(--text-dim); }
  .risk-chip {
    display: inline-block; padding: 6px 14px; border-radius: 999px;
    font-weight: 700; font-size: 0.9rem; color: white;
  }
  .risk-safe    { background: var(--safe); }
  .risk-caution { background: var(--caution); color: #1c1917; }
  .risk-warning { background: var(--warning); }
  .risk-danger  { background: var(--danger); }
  .risk-severe  { background: var(--severe); }

  .meta {
    display: grid; grid-template-columns: auto 1fr; gap: 6px 12px;
    font-size: 0.9rem; color: var(--text-dim);
  }
  .meta b { color: var(--text); font-weight: 600; }

  .contrib { display: grid; grid-template-columns: 1fr auto; gap: 6px 12px; }
  .contrib .label { color: var(--text-dim); font-size: 0.9rem; }
  .contrib .value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .contrib .value.pos { color: #fca5a5; }
  .contrib .value.neg { color: #86efac; }

  .action-guide {
    background: rgba(56, 189, 248, 0.08);
    border-left: 3px solid var(--accent);
    padding: 12px; border-radius: 4px;
    font-size: 0.95rem; line-height: 1.55;
  }

  details { margin-top: 8px; }
  summary {
    cursor: pointer; color: var(--text-dim); font-size: 0.9rem;
    padding: 8px 0; user-select: none;
  }
  pre.raw {
    background: #020617; color: #cbd5e1; font-size: 0.75rem;
    padding: 12px; border-radius: 8px; overflow-x: auto;
    margin: 8px 0 0;
  }

  label { display: block; font-size: 0.9rem; color: var(--text-dim); margin: 8px 0 4px; }
  input[type=number], input[type=text], textarea {
    width: 100%; padding: 12px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font: inherit; font-size: 16px;
  }
  textarea { resize: vertical; min-height: 60px; }

  .history-item {
    display: grid; grid-template-columns: 1fr auto;
    gap: 4px 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item .ts { color: var(--text-dim); }
  .history-item .vpti-mini { font-weight: 700; }

  .button-row { display: flex; gap: 8px; }
  .button-row button { flex: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<main>
  <h1><span class="dot"></span>ClimaX VPTI 야외 검증</h1>

  <div class="card">
    <button id="btn-measure" class="primary">📍 현재 위치 측정</button>
    <div id="status" class="status"></div>
  </div>

  <div id="result" class="card hidden">
    <div class="meta">
      <b>좌표</b><span id="r-coord"></span>
      <b>측정</b><span id="r-ts"></span>
      <b>계절</b><span id="r-season"></span>
    </div>

    <div class="vpti-display">
      <div><span id="r-vpti" class="vpti-number">--</span><span class="vpti-unit"> °C</span></div>
      <span id="r-risk" class="risk-chip">--</span>
    </div>

    <div class="action-guide" id="r-action">—</div>

    <h3 style="margin: 16px 0 8px; font-size: 1rem;">원인 분해 (Δ°C)</h3>
    <div class="contrib">
      <span class="label">공간 (VSI)</span> <span id="r-c-space" class="value">--</span>
      <span class="label">재질 (SMTI)</span><span id="r-c-mat"   class="value">--</span>
      <span class="label">바람 (PWI)</span> <span id="r-c-wind"  class="value">--</span>
    </div>

    <details>
      <summary>원본 응답 보기</summary>
      <pre class="raw" id="r-raw"></pre>
    </details>
  </div>

  <div id="memo" class="card hidden">
    <h3 style="margin: 0 0 8px; font-size: 1rem;">📝 실측값 메모</h3>
    <label for="m-temp">실측 온도 (°C)</label>
    <input id="m-temp" type="number" step="0.1" inputmode="decimal" placeholder="예: 28.5">
    <label for="m-wind">실측 풍속 (m/s)</label>
    <input id="m-wind" type="number" step="0.1" inputmode="decimal" placeholder="예: 1.2">
    <label for="m-note">메모</label>
    <textarea id="m-note" placeholder="장소·상황·인상 등"></textarea>
    <div style="height: 12px"></div>
    <button id="btn-save" class="secondary">💾 저장 (localStorage)</button>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <h3 style="margin: 0; font-size: 1rem;">📋 저장된 측정</h3>
      <span id="history-count" class="status">0건</span>
    </div>
    <div id="history-list"></div>
    <div style="height: 8px"></div>
    <div class="button-row">
      <button id="btn-export" class="secondary">⬇️ CSV 내보내기</button>
      <button id="btn-clear" class="secondary danger-btn">🗑️ 전체 삭제</button>
    </div>
  </div>
</main>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "climax_validations_v1";
  const RISK_KO = {
    safe: "안전", caution: "주의", warning: "경계",
    danger: "위험", severe: "심각",
  };
  const SEASON_KO = {
    summer: "여름", winter: "겨울", transition: "환절기",
  };

  const $ = (id) => document.getElementById(id);
  const els = {
    btnMeasure: $("btn-measure"),
    status: $("status"),
    result: $("result"),
    memo: $("memo"),
    rCoord: $("r-coord"),
    rTs: $("r-ts"),
    rSeason: $("r-season"),
    rVpti: $("r-vpti"),
    rRisk: $("r-risk"),
    rAction: $("r-action"),
    rCSpace: $("r-c-space"),
    rCMat: $("r-c-mat"),
    rCWind: $("r-c-wind"),
    rRaw: $("r-raw"),
    mTemp: $("m-temp"),
    mWind: $("m-wind"),
    mNote: $("m-note"),
    btnSave: $("btn-save"),
    historyList: $("history-list"),
    historyCount: $("history-count"),
    btnExport: $("btn-export"),
    btnClear: $("btn-clear"),
  };

  let lastMeasurement = null;  // { lat, lon, vpti, risk, season, raw, ts }

  function setStatus(msg, isError = false) {
    els.status.textContent = msg || "";
    els.status.classList.toggle("error", !!isError);
  }

  function formatTs(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString("ko-KR", {
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
  }

  function formatDelta(v) {
    const n = typeof v === "number" ? v : parseFloat(v);
    if (isNaN(n)) return "—";
    return (n >= 0 ? "+" : "") + n.toFixed(2);
  }

  function setDeltaCell(el, v) {
    el.textContent = formatDelta(v);
    el.classList.toggle("pos", v > 0);
    el.classList.toggle("neg", v < 0);
  }

  function getPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error("이 브라우저는 위치 정보를 지원하지 않아요."));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve(pos.coords),
        (err) => {
          let msg;
          switch (err.code) {
            case 1: msg = "위치 권한이 거부됐어요. 브라우저 설정에서 허용해주세요. (HTTPS 또는 localhost 필요)"; break;
            case 2: msg = "현재 위치를 찾을 수 없어요. GPS 신호를 확인해주세요."; break;
            case 3: msg = "위치 조회 시간 초과. 다시 시도해주세요."; break;
            default: msg = "위치 조회 실패: " + err.message;
          }
          reject(new Error(msg));
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    });
  }

  async function fetchVpti(lat, lon) {
    const url = `/api/v1/vpti/at?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;
    const res = await fetch(url, { headers: { "accept": "application/json" } });
    const text = await res.text();
    let body;
    try { body = JSON.parse(text); } catch { body = { detail: text }; }
    if (!res.ok) {
      const detail = body && body.detail ? body.detail : `HTTP ${res.status}`;
      throw new Error(detail);
    }
    return body;
  }

  function renderResult(lat, lon, data) {
    els.rCoord.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
    els.rTs.textContent = formatTs(data.timestamp);
    els.rSeason.textContent = SEASON_KO[data.season] || data.season || "—";

    els.rVpti.textContent = (typeof data.vpti === "number" ? data.vpti.toFixed(1) : "—");

    const riskClass = `risk-${data.risk_level}`;
    els.rRisk.className = `risk-chip ${riskClass}`;
    els.rRisk.textContent = RISK_KO[data.risk_level] || data.risk_level || "—";

    els.rAction.textContent = data.action_guide || "—";

    const c = data.contributions || {};
    setDeltaCell(els.rCSpace, c.space);
    setDeltaCell(els.rCMat, c.material);
    setDeltaCell(els.rCWind, c.wind);

    els.rRaw.textContent = JSON.stringify(data, null, 2);

    els.result.classList.remove("hidden");
    els.memo.classList.remove("hidden");
  }

  async function onMeasure() {
    els.btnMeasure.disabled = true;
    setStatus("GPS 위치 받는 중…");
    try {
      const coords = await getPosition();
      const lat = coords.latitude;
      const lon = coords.longitude;
      setStatus(`좌표 OK (정확도 ±${Math.round(coords.accuracy)}m). VPTI 계산 중… (콜드 3~7초)`);

      const t0 = performance.now();
      const data = await fetchVpti(lat, lon);
      const elapsed = Math.round(performance.now() - t0);

      lastMeasurement = {
        lat, lon,
        vpti: data.vpti,
        risk: data.risk_level,
        season: data.season,
        raw: data,
        ts: data.timestamp || new Date().toISOString(),
      };
      renderResult(lat, lon, data);
      setStatus(`완료 (${elapsed}ms)`);

      els.mTemp.value = "";
      els.mWind.value = "";
      els.mNote.value = "";
    } catch (e) {
      setStatus(e.message || String(e), true);
    } finally {
      els.btnMeasure.disabled = false;
    }
  }

  // ===== localStorage =====

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveHistory(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function renderHistory() {
    const items = loadHistory();
    els.historyCount.textContent = `${items.length}건`;
    if (!items.length) {
      els.historyList.innerHTML = '<div class="status">아직 저장된 측정이 없어요.</div>';
      return;
    }
    els.historyList.innerHTML = items
      .slice()
      .reverse()
      .map((it, idx) => {
        const i = items.length - 1 - idx;
        const obs = it.observed_temp != null
          ? ` · 실측 ${it.observed_temp}°C`
          : "";
        const wind = it.observed_wind != null
          ? `/${it.observed_wind}m·s` : "";
        return `
          <div class="history-item">
            <div>
              <div class="ts">${formatTs(it.saved_at)}</div>
              <div>좌표 ${it.lat.toFixed(5)}, ${it.lon.toFixed(5)}${obs}${wind}</div>
              ${it.note ? `<div class="ts">메모: ${escapeHtml(it.note)}</div>` : ""}
            </div>
            <div style="text-align:right;">
              <div class="vpti-mini">${it.vpti != null ? it.vpti.toFixed(1) : "—"}°C</div>
              <div class="ts">${RISK_KO[it.risk] || it.risk || "—"}</div>
            </div>
          </div>`;
      })
      .join("");
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function onSave() {
    if (!lastMeasurement) {
      setStatus("먼저 측정해주세요.", true);
      return;
    }
    const obsTemp = els.mTemp.value === "" ? null : parseFloat(els.mTemp.value);
    const obsWind = els.mWind.value === "" ? null : parseFloat(els.mWind.value);
    const note = els.mNote.value.trim();

    const items = loadHistory();
    items.push({
      saved_at: new Date().toISOString(),
      lat: lastMeasurement.lat,
      lon: lastMeasurement.lon,
      vpti: lastMeasurement.vpti,
      risk: lastMeasurement.risk,
      season: lastMeasurement.season,
      backend_ts: lastMeasurement.ts,
      observed_temp: isNaN(obsTemp) ? null : obsTemp,
      observed_wind: isNaN(obsWind) ? null : obsWind,
      note: note || null,
      raw: lastMeasurement.raw,
    });
    saveHistory(items);
    renderHistory();
    setStatus("저장됨.");
  }

  // ===== CSV export =====

  function csvEscape(v) {
    if (v == null) return "";
    const s = String(v);
    if (/[",\n\r]/.test(s)) return `"${s.replaceAll('"', '""')}"`;
    return s;
  }

  function onExport() {
    const items = loadHistory();
    if (!items.length) {
      setStatus("저장된 데이터가 없어요.", true);
      return;
    }
    const headers = [
      "saved_at", "lat", "lon", "vpti", "risk", "season",
      "observed_temp", "observed_wind", "note", "backend_ts",
    ];
    const lines = [headers.join(",")];
    for (const it of items) {
      lines.push(headers.map((h) => csvEscape(it[h])).join(","));
    }
    const csv = "﻿" + lines.join("\r\n");  // BOM → Excel에서 한글 안 깨짐
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `climax_validations_${new Date().toISOString().slice(0, 19).replaceAll(":", "-")}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus(`${items.length}건 내보냄.`);
  }

  function onClear() {
    if (!loadHistory().length) return;
    if (!confirm("저장된 측정을 모두 삭제할까요? (되돌릴 수 없음)")) return;
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
    setStatus("전체 삭제 완료.");
  }

  els.btnMeasure.addEventListener("click", onMeasure);
  els.btnSave.addEventListener("click", onSave);
  els.btnExport.addEventListener("click", onExport);
  els.btnClear.addEventListener("click", onClear);

  renderHistory();
})();
</script>
</body>
</html>
