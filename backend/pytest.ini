[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --tb=short

markers =
    slow: 시간이 오래 걸리는 테스트 (ML 추론 등)
    integration: 외부 API 호출이 필요한 통합 테스트
    paper_reproduction: VSI 논문 결과 재현 테스트
