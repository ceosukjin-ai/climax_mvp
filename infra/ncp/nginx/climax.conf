# ===========================================================================
# ClimaX — web(lbs-climax-web) nginx 리버스 프록시
#
# 역할: 외부 80 → 내부 was(10.20.10.205):8000
#
# 설치:
#   sudo cp climax.conf /etc/nginx/sites-available/climax
#   sudo ln -sf /etc/nginx/sites-available/climax /etc/nginx/sites-enabled/climax
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# 확인:
#   curl http://180.210.76.123/api/v1/health
# ===========================================================================

# WebSocket Upgrade 헤더 처리용.
# sites-enabled/* 는 nginx.conf의 http{} 안에서 include되므로
# 이 파일 최상단은 http 컨텍스트 — map 사용 가능합니다.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream climax_api {
    server 10.20.10.205:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 업로드/응답 크기 — Street View 이미지 처리 고려
    client_max_body_size 20m;

    # 프록시 공통 타임아웃
    # 콜드 스타트 시 SegFormer 추론이 오래 걸릴 수 있어 넉넉히
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ---- REST + WebSocket ----
    # WebSocket은 /api/v1/track 에 있고 같은 prefix 아래라
    # 하나의 location에서 Upgrade 헤더까지 함께 처리합니다.
    location /api/ {
        proxy_pass http://climax_api;
        proxy_http_version 1.1;

        # WebSocket 핸드셰이크
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 원본 클라이언트 정보 전달
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE/WebSocket 버퍼링 해제
        proxy_buffering off;
    }

    # ---- 헬스체크 (LB용 — 프록시 없이 nginx가 직접 응답) ----
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- 그 외 ----
    # Step 4에서 Next.js 대시보드 붙일 자리
    location / {
        return 404;
    }
}
